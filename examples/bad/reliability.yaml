receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"

processors:
  batch:
    timeout: 200ms
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  filter:
    error_mode: ignore

exporters:
  otlphttp:
    endpoint: "https://backend:4318"
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, filter, memory_limiter]
      exporters: [otlphttp]
    metrics:
      receivers: [otlp]
      processors: []
      exporters: [otlphttp]
