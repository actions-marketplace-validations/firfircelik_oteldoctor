receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  batch:
    timeout: 200ms
  filter:
    error_mode: ignore

exporters:
  otlp:
    endpoint: "https://backend:4317"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, filter, memory_limiter]
      exporters: [otlp]
