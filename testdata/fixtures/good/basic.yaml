receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  batch:
    timeout: 200ms
    send_batch_size: 8192

exporters:
  otlphttp:
    endpoint: "https://backend:4318"
    compression: gzip
  debug:
    verbosity: detailed

connectors:
  count_connector:
    metrics: {}

service:
  extensions: [health_check, pprof]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp]
    metrics:
      receivers: [otlp, count_connector]
      processors: [memory_limiter, batch]
      exporters: [count_connector, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp]
  telemetry:
    logs:
      level: info
    metrics:
      level: detailed
      address: "0.0.0.0:8888"

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"
  pprof:
    endpoint: "0.0.0.0:1777"
