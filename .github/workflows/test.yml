name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Tidy modules
        run: go mod tidy

      - name: Check module diff
        run: git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 ./...

      - name: Test race
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -o bin/oteldoctor ./cmd/oteldoctor

      - name: Smoke — good dev config (expect 0)
        run: ./bin/oteldoctor analyze examples/good/collector-dev.yaml

      - name: Smoke — good production config (expect 0)
        run: ./bin/oteldoctor analyze --profile production examples/good/collector-production.yaml

      - name: Smoke — bad config with fail-on critical (expect 1)
        shell: bash
        run: |
          set +e
          ./bin/oteldoctor analyze --fail-on critical examples/bad/structural.yaml
          ec=$?
          if [ $ec -ne 1 ]; then
            echo "FAIL: expected exit code 1, got $ec"
            exit 1
          fi
          echo "PASS: got expected exit code 1"

      - name: Smoke — parse error (expect 2)
        shell: bash
        run: |
          echo 'receivers:' > /tmp/invalid-otel.yaml
          echo '	bad: tab' >> /tmp/invalid-otel.yaml
          set +e
          ./bin/oteldoctor analyze /tmp/invalid-otel.yaml
          ec=$?
          if [ $ec -ne 2 ]; then
            echo "FAIL: expected exit code 2, got $ec"
            exit 1
          fi
          echo "PASS: got expected exit code 2"

      - name: Smoke — JSON output
        shell: bash
        run: |
          set +e
          ./bin/oteldoctor analyze --profile production --format json examples/bad/security.yaml > /tmp/oteldoctor.json
          ec=$?
          if [ $ec -ne 0 ] && [ $ec -ne 1 ]; then
            echo "FAIL: unexpected exit code $ec for JSON output"
            exit 1
          fi
          python3 -c "import json; json.load(open('/tmp/oteldoctor.json'))" || {
            echo "FAIL: invalid JSON output"
            exit 1
          }
          echo "PASS: valid JSON output"

      - name: Smoke — SARIF output (bad config, verify format only)
        shell: bash
        run: |
          set +e
          ./bin/oteldoctor analyze --profile production --format sarif examples/bad/security.yaml > /tmp/oteldoctor.sarif
          ec=$?
          if [ $ec -ne 0 ] && [ $ec -ne 1 ]; then
            echo "FAIL: unexpected exit code $ec for SARIF output"
            exit 1
          fi
          python3 -c "import json; json.load(open('/tmp/oteldoctor.sarif'))" || {
            echo "FAIL: invalid SARIF JSON"
            exit 1
          }
          echo "PASS: valid SARIF output"

      - name: Smoke — version
        run: ./bin/oteldoctor version

      - name: Smoke — explain
        run: ./bin/oteldoctor explain OTEL-SEC-202

      - name: Smoke — graph
        run: ./bin/oteldoctor graph examples/good/collector-production.yaml --format mermaid

      - name: Smoke — autofix dry-run
        run: ./bin/oteldoctor fix examples/bad/reliability.yaml --dry-run
