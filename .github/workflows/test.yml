name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Run go vet
        run: go vet ./...

      - name: Build binary
        run: go build -o bin/oteldoctor ./cmd/oteldoctor

      - name: Smoke test good config
        run: ./bin/oteldoctor analyze examples/good/collector-dev.yaml

      - name: Smoke test production config
        run: ./bin/oteldoctor analyze --profile production examples/good/collector-production.yaml

      - name: Smoke test bad config should fail
        run: |
          set +e
          ./bin/oteldoctor analyze --fail-on critical examples/bad/structural.yaml
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "Expected bad structural config to fail with --fail-on critical, but it passed"
            exit 1
          fi

          if [ "$status" -ne 1 ]; then
            echo "Expected exit code 1 for diagnostics above threshold, got $status"
            exit 1
          fi

      - name: Smoke test JSON output
        run: ./bin/oteldoctor analyze --profile production --format json examples/bad/security.yaml

      - name: Smoke test SARIF output
        run: ./bin/oteldoctor analyze --profile production --format sarif examples/bad/security.yaml

      - name: Smoke test graph command
        run: ./bin/oteldoctor graph examples/good/collector-production.yaml --format mermaid

      - name: Smoke test explain command
        run: ./bin/oteldoctor explain OTEL-SEC-202

      - name: Smoke test autofix dry-run
        run: ./bin/oteldoctor fix examples/bad/reliability.yaml --dry-run