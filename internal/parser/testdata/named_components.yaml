receivers:
  otlp/datadog:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
  otlp/newrelic:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch/default:
    timeout: 200ms
  filter/errors:
    error_mode: ignore

exporters:
  debug/inspect:
    verbosity: detailed
  otlphttp/prod:
    endpoint: "https://backend:4318"

service:
  pipelines:
    metrics:
      receivers: [otlp/datadog, otlp/newrelic]
      processors: [batch/default, filter/errors]
      exporters: [debug/inspect]
    traces:
      receivers: [otlp/datadog]
      processors: [batch/default]
      exporters: [otlphttp/prod]
  extensions: [health_check]
